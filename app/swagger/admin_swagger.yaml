#app/swagger/admin_swagger.yaml
swagger: "2.0"
info:
  title: Admin API
  version: "1.0"
paths:
  /forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar recuperação de senha
      parameters:
        - in: body
          name: credentials
          schema:
            type: object
            properties:
              email:
                type: string
                format: email
            required: true
      responses:
        200:
          description: Mensagem de confirmação

  /reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha com token
      parameters:
        - in: body
          name: credentials
          schema:
            type: object
            properties:
              email:
                type: string
                format: email
              reset_token:
                type: string
              new_password:
                type: string
            required: true
      responses:
        200:
          description: Senha redefinida

  /login:
    post:
      tags: [Auth]
      summary: Login de administrador
      parameters:
        - in: body
          name: credentials
          schema:
            type: object
            properties:
              username:
                type: string
                description: Pode ser username ou email
              password:
                type: string
            required: true
      responses:
        200:
          description: Token JWT

  /admins:
    get:
      tags: [Admins]
      summary: Listar todos os admins
      security:
        - BearerAuth: []
      responses:
        200:
          description: Lista de administradores
    post:
      tags: [Admins]
      summary: Criar novo admin
      security:  
        - BearerAuth: []
      parameters:
        - in: body
          name: admin
          schema:
            type: object
            properties:
              username:
                type: string
              password:
                type: string
              email:
                type: string
                format: email
            required:
              - username
              - password
              - email
      responses:
        201:
          description: Admin criado

  /admins/me:
    put:
      tags: [Admins]
      summary: Atualizar próprio admin
      security: 
        - BearerAuth: []
      parameters:
        - in: body
          name: admin
          schema:
            type: object
            properties:
              username:
                type: string
              password:
                type: string
              email:
                type: string
                format: email
      responses:
        200:
          description: Admin atualizado

  /admins/{admin_id}:
    delete:
      tags: [Admins]
      summary: Deletar um admin (apenas admin)
      security:
        - BearerAuth: []
      parameters:
        - name: admin_id
          in: path
          type: integer
          required: true
          description: ID do admin a ser deletado
      responses:
        200:
          description: Admin deletado
        400:
          description: Não é permitido deletar a si mesmo ou o admin padrão
        404:
          description: Admin não encontrado

  /users/{user_id}:
    delete:
      tags: [Users]
      summary: Deletar um usuário (apenas admin)
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          type: integer
          required: true
          description: ID do usuário a ser deletado
      responses:
        200:
          description: Usuário deletado
        400:
          description: Não é permitido deletar o usuário padrão
        404:
          description: Usuário não encontrado

  /users:
    get:
      tags: [Users]
      summary: Listar todos os usuários (apenas admin)
      security:
        - BearerAuth: []
      responses:
        200:
          description: Lista de usuários
    post:  
      tags: [Users]
      summary: Criar novo usuário (apenas admin)
      security:
        - BearerAuth: []
      parameters:
        - in: body
          name: user
          schema:
            type: object
            properties:
              username:
                type: string
              password:
                type: string
              email:
                type: string
                format: email
            required:
              - username
              - password
              - email
      responses:
        201:
          description: Usuário criado
        400:
          description: Dados inválidos ou usuário/email já existe

  /users/me:
    put:
      tags: [Users]
      summary: Atualizar próprio usuário
      security: 
        - BearerAuth: []
      parameters:
        - in: body
          name: user
          schema:
            type: object
            properties:
              username:
                type: string
              password:
                type: string
              email:
                type: string
                format: email
      responses:
        200:
          description: Usuário atualizado

  /users/me/upload:
      post:
        tags: [Users]
        summary: Upload de arquivo 
        security:
          - BearerAuth: []
        consumes:
          - multipart/form-data
        parameters:
          - in: formData
            name: file
            type: file
            required: true
            description: Arquivo a ser enviado
        responses:
          201:
            description: Sucesso no upload
          400:
            description: Erro de validação ou sem arquivo
          500:
            description: Erro interno ao salvar

  /logs:
      get:
        tags: [Logs]
        summary: Listar logs do sistema (apenas admin)
        security:
          - BearerAuth: []
        responses:
          200:
            description: Lista de logs do sistema
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  usuario_id:
                    type: integer
                  acao:
                    type: string
                  data_hora:
                    type: string
                    format: date-time
                  username:
                    type: string
                  email:
                    type: string

  /files:
      get:
        tags: [Files]
        summary: Listar arquivos enviados
        security:
          - BearerAuth: []
        responses:
          200:
            description: Lista de arquivos
            schema:
              type: array
              items:
                type: object
                properties:
                  user_id:
                    type: integer
                    description: ID do usuário dono do arquivo
                  name:
                    type: string
                  size:
                    type: integer
                  modified:
                    type: number
                  type:
                    type: string

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header