<!-- templates/swagger_ui.html -->
{% extends "drf-yasg/swagger-ui.html" %}

{% block extra_scripts %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Verificar se temos um token armazenado
            const storedToken = localStorage.getItem('swagger_token');
            
            if (storedToken) {
                console.log('Token encontrado no localStorage:', storedToken);
                
                // Função para tentar preencher a autorização
                const tryAuthorize = () => {
                    const authBtn = document.querySelector('.btn.authorize');
                    if (authBtn) {
                        console.log('Botão de autorização encontrado');
                        authBtn.click();
                        
                        setTimeout(() => {
                            const authModal = document.querySelector('.dialog-ux');
                            if (authModal) {
                                console.log('Modal de autorização aberto');
                                const input = authModal.querySelector('input');
                                
                                if (input) {
                                    input.value = 'Bearer ' + storedToken;
                                    console.log('Token preenchido no campo');
                                    
                                    // Disparar evento de input para atualizar o estado
                                    const event = new Event('input', { bubbles: true });
                                    input.dispatchEvent(event);
                                    
                                    // Clicar no botão de autorização para aplicar
                                    setTimeout(() => {
                                        const authorizeBtn = authModal.querySelector('.btn.modal-btn.auth.authorize');
                                        if (authorizeBtn) {
                                            authorizeBtn.click();
                                            console.log('Autorização aplicada');
                                        }
                                        
                                        // Fechar o modal após 1 segundo
                                        setTimeout(() => {
                                            const closeBtn = authModal.querySelector('.close-modal');
                                            if (closeBtn) closeBtn.click();
                                            console.log('Modal fechado');
                                            
                                            // Limpar o token após o uso
                                            localStorage.removeItem('swagger_token');
                                        }, 1000);
                                    }, 300);
                                }
                            }
                        }, 500);
                        
                        return true;
                    }
                    return false;
                };

                // Tentar imediatamente e depois em intervalos
                if (!tryAuthorize()) {
                    const interval = setInterval(() => {
                        if (tryAuthorize()) {
                            clearInterval(interval);
                        }
                    }, 1000);
                }
            } else {
                console.log('Nenhum token encontrado no localStorage');
            }
        });
    </script>
{% endblock %}
